<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Satellite Advisor - AgriAid</title>
    <link rel="stylesheet" href="satellite-style.css">
</head>
<body>
   <nav class="navbar">
    <div class="logo">
        <a href="index.html" style="color: white; text-decoration: none;">AgriAid — AI Farm Advisor</a>
    </div>
    
    <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="crop_doctor.html">Crop Doctor</a>
        <a href="satellite.html">Satellite Advisor</a>
        <a href="voice.html">Voice Assistant</a>
        <a href="mandi.html">Mandi Optimizer</a>
        <a href="pest_map.html">Pest Map</a>
    </div>
</nav>
    <div class="dashboard">
        <aside class="sidebar">
            <h2>🛰️ Satellite Advisor</h2>
            <div class="input-group">
                <label>Enter GPS Coordinates</label>
                <input type="text" id="coords" placeholder="e.g. 12.9716, 77.5946">
                <button id="fetchData" class="primary-btn">Analyze Field</button>
            </div>
            <div id="stats" class="hidden">
                <div class="stat-box">
                    <span>NDVI Index</span>
                    <strong id="ndvi">0.72 (Healthy)</strong>
                </div>
                <div class="stat-box">
                    <span>Moisture</span>
                    <strong id="moisture">45%</strong>
                </div>
            </div>
        </aside>

        <main class="map-area">
            <div id="map-placeholder">
                <p>Enter coordinates to load Satellite Heatmap</p>
                <img id="heatmap" src="" class="hidden">
            </div>
        </main>
    </div>
    <script src="satellite-script.js"></script>
</body>
</html>
<style>
    .navbar {
    background-color: #0b240b; /* Dark green from your mockup */
    display: flex;
    justify-content: space-between; /* Puts Logo on left, Links on right */
    align-items: center;
    padding: 15px 50px;
    color: white;
    position: fixed; /* Keeps it at the top when you scroll */
    top: 0;
    width: 100%;
    z-index: 1000;
}

.nav-links {
    display: flex;
    gap: 30px; /* Space between each link */
    margin-right: auto; /* This trick pushes the links toward the center */
    margin-left: auto;
}

.nav-links a {
    color: white;
    text-decoration: none;
    font-size: 1rem;
    font-weight: 500;
    transition: 0.3s;
    padding: 5px 10px;
}

.nav-links a:hover {
    color: #a3c18c; /* Light green hover effect */
    border-bottom: 2px solid white; /* Matches the white line in your mockup */
}
    body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #0d1b2a;
    color: #e0e1dd;
    height: 100vh;
}

.dashboard {
    display: flex;
    height: 100%;
}

.sidebar {
    width: 300px;
    background: #1b263b;
    padding: 30px;
    box-shadow: 2px 0 10px rgba(0,0,0,0.5);
}

.map-area {
    flex-grow: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #415a77;
    position: relative;
}

#map-placeholder {
    width: 90%;
    height: 80%;
    background: #0d1b2a;
    border: 2px solid #778da9;
    border-radius: 15px;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
}

.primary-btn {
    background: #00b4d8;
    color: white;
    border: none;
    padding: 12px;
    width: 100%;
    border-radius: 5px;
    cursor: pointer;
    margin-top: 10px;
}

.stat-box {
    background: #415a77;
    padding: 15px;
    border-radius: 8px;
    margin-top: 15px;
}

.hidden { display: none; }

#heatmap {
    width: 100%;
    height: 100%;
    object-fit: cover;
}
</style>
<script>
    document.getElementById('fetchData').addEventListener('click', function() {
    const coords = document.getElementById('coords').value;
    const btn = this;

    if (!coords) {
        alert("Please enter coordinates first!");
        return;
    }

    btn.innerText = "Connecting to Satellite...";
    
    // Simulate API delay
    setTimeout(() => {
        btn.innerText = "Analyze Field";
        document.getElementById('stats').classList.remove('hidden');
        
        // Show the satellite image I gave you earlier
        const heatmap = document.getElementById('heatmap');
        heatmap.src = 'assets/ndvi_map_placeholder.png';
        heatmap.classList.remove('hidden');
        
        document.getElementById('map-placeholder').querySelector('p').style.display = 'none';

        // Update stats
        document.getElementById('ndvi').innerText = "0.85 (Excellent)";
        document.getElementById('moisture').innerText = "62%";
    }, 2000);
});
</script>
