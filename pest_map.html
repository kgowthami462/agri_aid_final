    <div class="map-container">
        <header class="map-header">
            <h1>🛡️ Pest Outbreak Tracker</h1>
            <div class="risk-badge low" id="riskLevel">Risk: Low</div>
        </header>

        <div class="main-layout">
            <section class="control-panel">
                <h3>Select Pest Type</h3>
                <div class="pest-options">
                    <button class="pest-btn active" onclick="updateMap('locust')">Locusts</button>

                <div class="alert-box">
                    <h4>Current Alerts</h4>
                    <p id="alertText">No major outbreaks detected within 50km.</p>
                </div>
            </section>

            <section class="map-view">
                <div class="map-overlay">
                    <img src="C:\Users\gowthami k\OneDrive\agri-aid-folder\assets\pest_heatmap_placeholder.png" id="activePestMap" alt="Pest Heatmap">
                    <div class="legend">
                        <div class="legend-item"><span class="dot red"></span> High Risk</div>
                        <div class="legend-item"><span class="dot yellow"></span> Moderate</div>
                    </div>
                </div>
            </section>
        </div>
    </div>
    <script src="pest-script.js"></script>

<style>
    .navbar {
    background-color: #0b240b; /* Dark green from your mockup */
    display: flex;
    justify-content: space-between; /* Puts Logo on left, Links on right */
    align-items: center;
    padding: 15px 50px;
    color: white;
    position: fixed; /* Keeps it at the top when you scroll */
    top: 0;
    width: 100%;
    z-index: 1000;
}

.nav-links {
    display: flex;
    gap: 30px; /* Space between each link */
    margin-right: auto; /* This trick pushes the links toward the center */
    margin-left: auto;
}

.nav-links a {
    color: white;
    text-decoration: none;
    font-size: 1rem;
    font-weight: 500;
    transition: 0.3s;
    padding: 5px 10px;
}

.nav-links a:hover {
    color: #a3c18c; /* Light green hover effect */
    border-bottom: 2px solid white; /* Matches the white line in your mockup */
}
    body { font-family: 'Segoe UI', sans-serif; background: #f8f9fa; margin: 0; color: #333; }

.map-container { max-width: 1200px; margin: 20px auto; padding: 20px; }

.map-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }

.risk-badge { padding: 8px 20px; border-radius: 20px; font-weight: bold; text-transform: uppercase; }
.low { background: #d4edda; color: #155724; }
.high { background: #f8d7da; color: #721c24; }

.main-layout { display: flex; gap: 20px; }

.control-panel { width: 300px; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }

.pest-btn { 
    display: block; width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; 
    background: white; border-radius: 8px; cursor: pointer; text-align: left;
}
.pest-btn.active { background: #1a3d1a; color: white; border-color: #1a3d1a; }

.map-view { flex-grow: 1; background: white; padding: 10px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); position: relative; }

#activePestMap { width: 100%; border-radius: 8px; display: block; }

.legend { position: absolute; bottom: 30px; right: 30px; background: rgba(255,255,255,0.9); padding: 10px; border-radius: 5px; }
.dot { height: 10px; width: 10px; display: inline-block; border-radius: 50%; margin-right: 5px; }
.red { background: #ff4d4d; }
.yellow { background: #ffcc00; }
</style>
<script>
    function updateMap(pestType) {
    // 1. Update Button Highlights
    const buttons = document.querySelectorAll('.pest-btn');
    buttons.forEach(btn => btn.classList.remove('active'));
    event.target.classList.add('active');

    // 2. Update Alerts and Risk Level
    const riskBadge = document.getElementById('riskLevel');
    const alertText = document.getElementById('alertText');

    if (pestType === 'locust') {
        riskBadge.innerText = "Risk: High";
        riskBadge.className = "risk-badge high";
        alertText.innerText = "⚠️ Swarm detected 20km North-West. Wind moving toward your region.";
    } else {
        riskBadge.innerText = "Risk: Low";
        riskBadge.className = "risk-badge low";
        alertText.innerText = "No major outbreaks detected within 50km.";
    }
}
</script>
